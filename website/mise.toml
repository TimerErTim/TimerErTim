[tools]
node = "26"

[deps.npm]
auto = true

[tasks."generate:theme"]
description = "Generate theme CSS and TS from look-and-feel"
depends = ["//look-and-feel:build:json"]
file = "tasks/scripts/generate-theme.mjs"

[tasks."prepare:fonts"]
description = "Copy repo fonts into website public/fonts for Next.js"
depends = ["//look-and-feel:build:json"]
file = "tasks/scripts/prepare-fonts.mjs"

[tasks."generate:fonts"]
description = "Generate Next.js local font loaders from look-and-feel"
depends = ["prepare:fonts"]
file = "tasks/scripts/generate-fonts.mjs"

[tasks."prepare:identity"]
description = "Copy identity banners into website public/identity"
file = "tasks/scripts/prepare-identity.mjs"

[tasks."prepare:favicon"]
description = "Copy favicon bundle from assets/favicon into website public/"
file = "tasks/scripts/prepare-favicon.mjs"

[tasks."generate:assets"]
description = "Generate theme and font assets for the website"
depends = ["generate:theme", "generate:fonts", "prepare:identity", "prepare:favicon"]

[tasks.dev]
description = "Start Next.js dev server"
depends = ["generate:assets"]
run = ["npm run dev"]

[tasks.build]
description = "Build static Next.js export to out/"
depends = ["generate:assets", "//blogs/...:website-embedding"]
run = ["npm run build"]

[tasks."prepare:output_dir"]
hide = true
dir = "{{ vars.REPO_ROOT }}"
run = ["mkdir -p dist/website/"]

[tasks."export"]
description = "Copy static export to repo out/website/"
depends = ["build", "prepare:output_dir"]
run = [
    "rm -rf {{ vars.REPO_ROOT }}/dist/website",
    "cp -r out/ {{ vars.REPO_ROOT }}/dist/website",
    "mkdir -p {{ vars.REPO_ROOT }}/dist/website/api/blogs/",
    "cp -r {{ vars.REPO_ROOT }}/build/website/blogs/* {{ vars.REPO_ROOT }}/dist/website/api/blogs/",
]
