[tools]
node = "26"

[deps.npm]
auto = true

[tasks."generate:theme-css"]
description = "Generate Tailwind theme CSS from look and feel"
depends = ["//look-and-feel:build:json"]
file = "tasks/scripts/generate-theme-css.mjs"

[tasks.dev]
description = "Start Next.js dev server"
depends = ["generate:theme-css"]
run = ["npm run dev"]

[tasks.build]
description = "Build static Next.js export to out/"
depends = ["generate:theme-css", "//blogs/...:website-embedding"]
run = ["npm run build"]

[tasks."prepare:output_dir"]
hide = true
dir = "{{ vars.REPO_ROOT }}"
run = ["mkdir -p dist/website/"]

[tasks."export"]
description = "Copy static export to repo out/website/"
depends = ["build", "prepare:output_dir"]
run = [
    "rm -rf {{ vars.REPO_ROOT }}/dist/website",
    "cp -r out/ {{ vars.REPO_ROOT }}/dist/website",
    "mkdir -p {{ vars.REPO_ROOT }}/dist/website/api/blogs/",
    "cp -r {{ vars.REPO_ROOT }}/build/website/blogs/* {{ vars.REPO_ROOT }}/dist/website/api/blogs/",
]
